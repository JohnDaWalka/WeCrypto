<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regime Backtest Tester · WeCrypto (Electron)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0b1020; color: #e0e0e0; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; background: #141b2f; border: 1px solid #2a3f5f; border-radius: 8px; padding: 24px; }
    h1 { font-size: 24px; margin-bottom: 20px; color: #fff; }
    .controls { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    select, input, button { padding: 10px 14px; border: 1px solid #2a3f5f; background: #1a2540; color: #e0e0e0; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button { background: #0066cc; color: #fff; font-weight: 600; transition: background 0.2s; }
    .results { background: #0f1622; border: 1px solid #2a3f5f; border-radius: 4px; padding: 16px; margin-top: 24px; font-family: 'Courier New', monospace; font-size: 12px; max-height: 600px; overflow-y: auto; white-space: pre-wrap; }
    .status { padding: 12px; border-radius: 4px; margin-bottom: 16px; font-size: 14px; }
    .status.loading { background: #2a3f5f; color: #90caf9; }
    .status.success { background: #1b5e20; color: #81c784; }
    .status.error { background: #b71c1c; color: #ef5350; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Regime Backtest Tester (Electron)</h1>
    <div class="controls">
      <select id="coin">
        <option>BTC</option>
        <option>ETH</option>
        <option>SOL</option>
        <option>XRP</option>
        <option>DOGE</option>
        <option>BNB</option>
        <option>HYPE</option>
      </select>
      <input type="number" id="days" min="1" max="365" value="30" placeholder="Days">
      <button id="runBtn" onclick="runBacktest()">Run Backtest</button>
      <button onclick="clearResults()">Clear</button>
    </div>
    <div id="statusDiv"></div>
    <div id="resultsDiv" class="results"></div>
  </div>

  <script>
    async function runBacktest() {
      const coin = document.getElementById('coin').value;
      const days = parseInt(document.getElementById('days').value) || 30;
      const btn = document.getElementById('runBtn');
      const status = document.getElementById('statusDiv');
      const results = document.getElementById('resultsDiv');
      btn.disabled = true;
      status.innerHTML = `<div class="status loading">⏳ Running backtest for ${coin} (${days} days)...</div>`;
      results.textContent = '';
      try {
        const result = await window.electronAPI.runBacktest(coin, days);
        const data = JSON.parse(result);
        if (data.error) {
          status.innerHTML = `<div class="status error">❌ ${data.error}</div>`;
          results.textContent = result;
        } else {
          status.innerHTML = `<div class="status success">✓ Backtest complete: ${data.candles} candles</div>`;
          results.textContent = JSON.stringify(data, null, 2);
        }
      } catch (err) {
        status.innerHTML = `<div class="status error">❌ Error: ${err}</div>`;
        results.textContent = err;
      } finally {
        btn.disabled = false;
      }
    }
    function clearResults() { document.getElementById('statusDiv').innerHTML = ''; document.getElementById('resultsDiv').textContent = ''; }
    document.getElementById('days').addEventListener('keypress', (e) => { if (e.key === 'Enter') runBacktest(); });
  </script>
</body>
</html>
