/* ================================================================
   WalkerEnterprise Crypto Tracker — Styles
   Dark-first DevOps / Trading terminal aesthetic
   ================================================================ */

/* ---- Design Tokens ---- */
:root,
[data-theme='dark'] {
  --color-bg: #0b0c0f;
  --color-surface: #111318;
  --color-surface-2: #161920;
  --color-surface-3: #1c2029;
  --color-border: #252932;
  --color-border-dim: #1a1f28;
  --color-text: #e2e4ea;
  --color-text-muted: #7880a0;
  --color-text-faint: #444a60;
  --color-primary: #4f9eff;
  --color-primary-dim: #1a2d4a;
  --color-accent: #7c6aff;
  --color-green: #26d47e;
  --color-green-dim: #0d2a1a;
  --color-red: #ff4b6e;
  --color-red-dim: #2a0d16;
  --color-orange: #ff9f3a;
  --color-orange-dim: #2a1a08;
  --color-gold: #f5c842;
  --color-purple: #a78bfa;
  --color-solana: #9945ff;
  --color-cardano: #0033ad;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --font-body: 'General Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --transition: 160ms cubic-bezier(0.16, 1, 0.3, 1);
  --sidebar-w: 200px;
  --header-h: 52px;

  /* Glow effects */
  --glow-green: 0 0 12px rgba(38, 212, 126, 0.18);
  --glow-red: 0 0 12px rgba(255, 75, 110, 0.18);
  --glow-blue: 0 0 12px rgba(79, 158, 255, 0.18);
}

[data-theme='light'] {
  --color-bg: #f0f2f7;
  --color-surface: #ffffff;
  --color-surface-2: #f7f8fc;
  --color-surface-3: #eef0f7;
  --color-border: #dde0ea;
  --color-border-dim: #e8eaf2;
  --color-text: #1a1d2e;
  --color-text-muted: #6470a0;
  --color-text-faint: #b0b8d0;
  --color-primary: #1a6eff;
  --color-primary-dim: #e0ecff;
  --color-accent: #5a4ff0;
  --color-green: #0da85c;
  --color-green-dim: #d4f5e4;
  --color-red: #e03060;
  --color-red-dim: #fde4ec;
  --color-orange: #d47020;
  --color-orange-dim: #faecd8;
  --glow-green: none;
  --glow-red: none;
  --glow-blue: none;
}

/* ---- Base ---- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-body);
  background: var(--color-bg);
  color: var(--color-text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
a { color: var(--color-primary); text-decoration: none; }
input, select { font: inherit; color: inherit; }

/* ---- Layout ---- */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  height: 100dvh;
  overflow: hidden;
}

/* ---- Sidebar ---- */
.sidebar {
  background: var(--color-surface);
  border-right: 1px solid var(--color-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 20;
}

.sidebar-header {
  padding: 16px 14px 12px;
  border-bottom: 1px solid var(--color-border-dim);
}

.logo { display: flex; align-items: center; gap: 10px; }
.logo-text { display: flex; flex-direction: column; }
.logo-title {
  font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--color-text);
}
.logo-sub { font-size: 10px; color: var(--color-text-muted); letter-spacing: 0.04em; }

.nav {
  flex: 1;
  padding: 8px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow-y: auto;
}

.nav-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-md);
  font-size: 13px; font-weight: 500;
  color: var(--color-text-muted);
  transition: background var(--transition), color var(--transition);
  width: 100%; text-align: left;
}
.nav-btn:hover { background: var(--color-surface-2); color: var(--color-text); }
.nav-btn.active {
  background: var(--color-primary-dim);
  color: var(--color-primary);
}
.nav-btn svg { flex-shrink: 0; }

.sidebar-footer {
  padding: 12px 14px;
  border-top: 1px solid var(--color-border-dim);
  display: flex; flex-direction: column; gap: 4px;
}
.feed-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--color-text-muted);
}
.pulse-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--color-green);
  animation: pulse 2s ease-in-out infinite;
  box-shadow: var(--glow-green);
}
.pulse-dot.loading { background: var(--color-orange); }
.pulse-dot.error { background: var(--color-red); animation: none; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.last-update { font-size: 10px; color: var(--color-text-faint); font-family: var(--font-mono); }

/* ---- Main Wrap ---- */
.main-wrap {
  display: grid;
  grid-template-rows: var(--header-h) 1fr;
  overflow: hidden;
}

/* ---- Header ---- */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  gap: 12px;
  z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.menu-btn {
  color: var(--color-text-muted);
  padding: 4px;
  border-radius: var(--radius-sm);
  display: none;
}

.page-title { font-size: 15px; font-weight: 600; }

.market-summary {
  display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
  font-size: 11px;
}
.ms-item { display: flex; align-items: center; gap: 4px; color: var(--color-text-muted); }
.ms-val { color: var(--color-text); font-weight: 600; font-family: var(--font-mono); }
.ms-chg { font-family: var(--font-mono); }
.ms-chg.pos { color: var(--color-green); }
.ms-chg.neg { color: var(--color-red); }

.refresh-wrap { display: flex; align-items: center; gap: 0; }
.refresh-btn {
  padding: 6px 8px;
  color: var(--color-text-muted);
  border-radius: var(--radius-sm) 0 0 var(--radius-sm);
  border: 1px solid var(--color-border);
  border-right: none;
  transition: color var(--transition), background var(--transition);
}
.refresh-btn:hover { color: var(--color-primary); background: var(--color-primary-dim); }
.refresh-btn.spinning svg { animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.refresh-select {
  padding: 5px 8px; font-size: 11px;
  background: var(--color-surface-2);
  border: 1px solid var(--color-border);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  color: var(--color-text-muted);
  cursor: pointer;
}

.theme-btn {
  padding: 6px 8px;
  color: var(--color-text-muted);
  border-radius: var(--radius-sm);
  border: 1px solid var(--color-border);
  transition: color var(--transition), background var(--transition);
}
.theme-btn:hover { color: var(--color-primary); background: var(--color-primary-dim); }

/* ---- Content ---- */
.content {
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px 20px 24px;
  overscroll-behavior: contain;
}

/* ---- Loading ---- */
.loading-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; height: 60vh; color: var(--color-text-muted); font-size: 13px;
}
.loader-ring {
  width: 36px; height: 36px;
  border: 2px solid var(--color-border);
  border-top-color: var(--color-primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* ---- KPI Bar ---- */
.kpi-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.kpi-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 12px 14px;
}
.kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-muted); margin-bottom: 4px; }
.kpi-val { font-size: 18px; font-weight: 700; font-family: var(--font-mono); line-height: 1.2; }
.kpi-sub { font-size: 11px; color: var(--color-text-muted); margin-top: 2px; }
.kpi-val.green { color: var(--color-green); }
.kpi-val.red { color: var(--color-red); }
.kpi-val.blue { color: var(--color-primary); }
.kpi-val.gold { color: var(--color-gold); }

.engine-hero {
  display: grid;
  grid-template-columns: minmax(0, 1.5fr) minmax(280px, 1fr);
  gap: 14px;
  padding: 18px 20px;
  margin-bottom: 14px;
  background:
    radial-gradient(circle at top right, rgba(79, 158, 255, 0.14), transparent 35%),
    linear-gradient(135deg, var(--color-surface) 0%, var(--color-surface-2) 100%);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
}

.engine-eyebrow {
  margin-bottom: 8px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-primary);
}

.engine-title {
  margin: 0 0 8px;
  font-size: 24px;
  line-height: 1.1;
}

.engine-copy {
  max-width: 68ch;
  color: var(--color-text-muted);
}

.engine-meta-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.engine-meta-card {
  padding: 12px;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
}

.engine-meta-card span {
  display: block;
  margin-bottom: 4px;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--color-text-muted);
}

.engine-meta-card strong {
  display: block;
  font-size: 20px;
  line-height: 1;
  font-family: var(--font-mono);
}

.engine-meta-card small {
  display: block;
  margin-top: 4px;
  color: var(--color-text-muted);
}

/* ---- Markets Table ---- */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-muted); }

.coin-filters {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.filter-btn {
  padding: 4px 10px; font-size: 11px; font-weight: 500;
  border-radius: var(--radius-full, 9999px);
  border: 1px solid var(--color-border);
  color: var(--color-text-muted);
  transition: all var(--transition);
}
.filter-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
.filter-btn.active { background: var(--color-primary-dim); border-color: var(--color-primary); color: var(--color-primary); }

.table-wrap {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.price-table {
  width: 100%; border-collapse: collapse;
  font-size: 13px;
}
.price-table thead { position: sticky; top: 0; z-index: 2; }
.price-table th {
  padding: 10px 12px;
  background: var(--color-surface-2);
  text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--color-text-muted); font-weight: 600;
  border-bottom: 1px solid var(--color-border);
  cursor: pointer; user-select: none; white-space: nowrap;
}
.price-table th:hover { color: var(--color-text); }
.price-table th.sorted { color: var(--color-primary); }
.price-table td {
  padding: 10px 12px; border-bottom: 1px solid var(--color-border-dim);
  font-family: var(--font-mono); white-space: nowrap;
}
.price-table tr:last-child td { border-bottom: none; }
.price-table tr:hover td { background: var(--color-surface-2); }

.coin-cell {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-body);
}
.coin-icon {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
  font-family: var(--font-body);
}
.coin-name { font-weight: 600; font-size: 13px; }
.coin-sym { font-size: 10px; color: var(--color-text-muted); letter-spacing: 0.04em; font-family: var(--font-mono); }

.price-val { font-weight: 600; color: var(--color-text); }
.change-pos { color: var(--color-green); }
.change-neg { color: var(--color-red); }

.vol-bar-wrap { display: flex; align-items: center; gap: 6px; }
.vol-bar-bg {
  height: 3px; width: 60px; background: var(--color-border);
  border-radius: 2px; overflow: hidden;
}
.vol-bar-fill { height: 100%; background: var(--color-primary); opacity: 0.5; border-radius: 2px; }

.spark-cell { width: 80px; }
.spark-canvas { width: 80px !important; height: 28px !important; }

.chart-btn {
  padding: 3px 8px; font-size: 10px; font-weight: 600;
  border-radius: var(--radius-sm);
  border: 1px solid var(--color-border);
  color: var(--color-text-muted); font-family: var(--font-body);
  transition: all var(--transition);
}
.chart-btn:hover { border-color: var(--color-primary); color: var(--color-primary); background: var(--color-primary-dim); }

/* ---- Portfolio View ---- */
.portfolio-layout {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 16px;
}

.card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 16px;
}

.card-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--color-text-muted); margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}

.portfolio-total {
  font-size: 32px; font-weight: 700; font-family: var(--font-mono);
  color: var(--color-text); line-height: 1;
}
.portfolio-pnl {
  font-size: 13px; margin-top: 4px; font-family: var(--font-mono);
}

.holding-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--color-border-dim);
}
.holding-row:last-child { border-bottom: none; }

.holding-info { flex: 1; min-width: 0; }
.holding-name { font-size: 13px; font-weight: 600; }
.holding-amt { font-size: 11px; color: var(--color-text-muted); font-family: var(--font-mono); margin-top: 1px; }

.holding-right { text-align: right; }
.holding-val { font-size: 13px; font-weight: 600; font-family: var(--font-mono); }
.holding-chg { font-size: 11px; font-family: var(--font-mono); margin-top: 1px; }

.alloc-bar-wrap { width: 100%; height: 6px; background: var(--color-border); border-radius: 3px; overflow: hidden; margin-top: 4px; }
.alloc-bar { height: 100%; border-radius: 3px; }

.input-group {
  display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
}
.input-label { font-size: 11px; color: var(--color-text-muted); min-width: 40px; }
.input-field {
  flex: 1; padding: 5px 8px; font-size: 12px; font-family: var(--font-mono);
  background: var(--color-surface-2); border: 1px solid var(--color-border);
  border-radius: var(--radius-sm); color: var(--color-text);
  transition: border-color var(--transition);
}
.input-field:focus { outline: none; border-color: var(--color-primary); }

.btn-primary {
  padding: 8px 16px; font-size: 12px; font-weight: 600;
  background: var(--color-primary); color: #fff;
  border-radius: var(--radius-md); border: none;
  transition: opacity var(--transition);
  width: 100%;
}
.btn-primary:hover { opacity: 0.88; }

/* Allocation donut */
.donut-wrap { display: flex; justify-content: center; margin: 12px 0; }
.donut-canvas { max-width: 180px; }

.legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; padding: 3px 0;
}
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ---- Charts View ---- */
.charts-controls {
  display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
}
.coin-select-wrap {
  display: flex; align-items: center; gap: 8px;
}
.ctrl-label { font-size: 11px; color: var(--color-text-muted); }
.ctrl-select {
  padding: 5px 10px; font-size: 12px; font-family: var(--font-mono);
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); color: var(--color-text); cursor: pointer;
}
.tf-btns { display: flex; gap: 2px; }
.tf-btn {
  padding: 5px 10px; font-size: 11px; font-weight: 600;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm); color: var(--color-text-muted);
  transition: all var(--transition);
}
.tf-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
.tf-btn.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }

.chart-container {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 16px;
  height: 420px;
  position: relative;
}
.chart-stage { width: 100%; height: 388px; }
.chart-loading {
  position: absolute; inset: 16px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(10, 14, 24, 0.62);
  border-radius: var(--radius-md);
  z-index: 2;
}
.chart-legend {
  display: flex; gap: 16px; flex-wrap: wrap;
  font-size: 11px; color: var(--color-text-muted);
  margin-top: 10px;
}
.cl-item { display: flex; align-items: center; gap: 6px; }
.cl-green { color: var(--color-green); }
.cl-red { color: var(--color-red); }

.ohlc-row {
  display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap;
}
.ohlc-item {
  display: flex; flex-direction: column; gap: 2px;
}
.ohlc-label { font-size: 10px; color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.06em; }
.ohlc-val { font-size: 13px; font-weight: 600; font-family: var(--font-mono); }

/* ---- On-Chain View ---- */
.onchain-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.wallet-input-wrap {
  display: flex; gap: 8px; margin-bottom: 14px;
}
.wallet-input {
  flex: 1; padding: 8px 12px; font-size: 12px; font-family: var(--font-mono);
  background: var(--color-surface-2); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); color: var(--color-text);
}
.wallet-input:focus { outline: none; border-color: var(--color-primary); }
.btn-sm {
  padding: 8px 14px; font-size: 12px; font-weight: 600;
  background: var(--color-primary); color: #fff;
  border-radius: var(--radius-md); white-space: nowrap;
  transition: opacity var(--transition);
}
.btn-sm:hover { opacity: 0.88; }
.btn-outline {
  padding: 7px 14px; font-size: 12px; font-weight: 600;
  background: none; color: var(--color-primary);
  border: 1px solid var(--color-primary); border-radius: var(--radius-md);
  transition: all var(--transition);
}
.btn-outline:hover { background: var(--color-primary-dim); }

.token-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid var(--color-border-dim);
  font-size: 12px;
}
.token-row:last-child { border-bottom: none; }
.token-sym { font-family: var(--font-mono); font-weight: 600; color: var(--color-primary); min-width: 60px; }
.token-name { color: var(--color-text-muted); flex: 1; }
.token-bal { font-family: var(--font-mono); color: var(--color-text); text-align: right; }
.token-val { font-family: var(--font-mono); color: var(--color-gold); text-align: right; min-width: 70px; }

.tx-row {
  padding: 8px 0; border-bottom: 1px solid var(--color-border-dim);
  font-size: 11px;
}
.tx-row:last-child { border-bottom: none; }
.tx-hash {
  font-family: var(--font-mono); color: var(--color-primary);
  font-size: 10px; cursor: pointer;
}
.tx-meta { color: var(--color-text-muted); margin-top: 2px; }
.tx-val { font-family: var(--font-mono); font-weight: 600; margin-top: 2px; }
.tx-val.in { color: var(--color-green); }
.tx-val.out { color: var(--color-red); }

.chain-chip {
  display: inline-block; padding: 2px 6px; font-size: 9px; font-weight: 700;
  border-radius: var(--radius-sm); background: var(--color-surface-3);
  text-transform: uppercase; letter-spacing: 0.06em;
}

/* ---- Screener View ---- */
.screener-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.screener-toolbar {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.screener-summary-strip {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-left: auto;
}
.screener-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  border-radius: 9999px;
  background: var(--color-surface-2);
  color: var(--color-text-muted);
  font-size: 10px;
  font-weight: 700;
}
.screener-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 14px;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
  position: relative;
  overflow: hidden;
}
.screener-card:hover { border-color: var(--color-primary); }
.screener-card.bullish { border-color: var(--color-green-dim); }
.screener-card.bearish { border-color: var(--color-red-dim); }

.sc-header-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}
.sc-token-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}
.sc-token-logo,
.sc-token-fallback {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  object-fit: cover;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}

.sc-ticker { font-size: 15px; font-weight: 700; }
.sc-name { font-size: 11px; color: var(--color-text-muted); margin-bottom: 8px; }
.sc-price { font-size: 18px; font-weight: 700; font-family: var(--font-mono); }
.sc-chg { font-size: 13px; font-family: var(--font-mono); font-weight: 600; }
.sc-chg.pos { color: var(--color-green); }
.sc-chg.neg { color: var(--color-red); }
.sc-vol { font-size: 10px; color: var(--color-text-faint); margin-top: 4px; font-family: var(--font-mono); }
.sc-meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 8px;
  margin-top: 6px;
}

.sc-sparkwrap { position: absolute; bottom: 0; left: 0; right: 0; height: 40px; opacity: 0.4; }

.signal-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 6px; font-size: 9px; font-weight: 700;
  border-radius: var(--radius-sm); text-transform: uppercase; letter-spacing: 0.06em;
  margin-top: 6px;
}
.signal-badge.bullish { background: var(--color-green-dim); color: var(--color-green); }
.signal-badge.bearish { background: var(--color-red-dim); color: var(--color-red); }
.signal-badge.neutral { background: var(--color-surface-3); color: var(--color-text-muted); }

/* ---- Error / Empty states ---- */
.empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--color-text-muted); font-size: 13px;
}
.empty-state svg { margin-bottom: 12px; opacity: 0.4; }

.error-notice {
  background: var(--color-red-dim);
  border: 1px solid var(--color-red);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  font-size: 12px; color: var(--color-red);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}

/* ---- Highlight flash on price update ---- */
@keyframes flashGreen { from { background: var(--color-green-dim); } to { background: transparent; } }
@keyframes flashRed { from { background: var(--color-red-dim); } to { background: transparent; } }
.flash-green { animation: flashGreen 0.6s ease-out; }
.flash-red { animation: flashRed 0.6s ease-out; }

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 2px; }

/* ---- CFM Benchmark Orchestrator ---- */

/* Coin header card */
.cfm-coin-header {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 14px 18px;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 14px;
}
.cfm-toggle {
  width: 100%;
  text-align: left;
  cursor: pointer;
  font: inherit;
  color: inherit;
}
.cfm-coin-block { margin-bottom: 12px; }
.cfm-expand-icon,
.pred-expand-icon {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--color-surface-2);
  color: var(--color-text-muted);
  font-weight: 700;
  flex-shrink: 0;
}
.cfm-coin-icon {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; flex-shrink: 0;
}
.cfm-coin-meta { flex: 1; }
.cfm-coin-sym { font-size: 18px; font-weight: 700; }
.cfm-coin-name { font-size: 11px; color: var(--color-text-muted); }
.cfm-coin-rate { font-size: 20px; font-weight: 700; font-family: var(--font-mono); text-align: right; }
.cfm-coin-sub { font-size: 10px; color: var(--color-text-muted); text-align: right; font-family: var(--font-mono); }

/* Periodic table grid for suborbitals */
.cfm-table {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
  gap: 5px;
  margin-bottom: 12px;
}
.cfm-expand-panel,
.pred-expand-panel {
  display: none;
}
.cfm-expand-panel.open,
.pred-expand-panel.open {
  display: block;
}
.cfm-detail-grid,
.pred-detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 8px;
  margin-bottom: 10px;
}
.cfm-detail-card {
  background: var(--color-surface-2);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.cfm-detail-card strong {
  font-size: 14px;
  font-family: var(--font-mono);
}
.cfm-detail-card small,
.cfm-detail-label {
  color: var(--color-text-muted);
  font-size: 10px;
}
.cfm-detail-strip {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* Each element = one indicator/suborbital */
.cfm-element {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 8px 7px 7px;
  position: relative;
  overflow: hidden;
  transition: border-color var(--transition), box-shadow var(--transition);
  min-height: 82px;
  cursor: default;
}
.cfm-element:hover { border-color: var(--color-primary); box-shadow: var(--glow-blue); }
.cfm-element.bull { border-top: 2px solid var(--color-green); }
.cfm-element.bear { border-top: 2px solid var(--color-red); }
.cfm-element.flat { border-top: 2px solid var(--color-text-faint); }
.cfm-element.warn { border-top: 2px solid var(--color-orange); }

/* Atomic number = shell/group label */
.cfm-atomic {
  position: absolute; top: 3px; left: 5px;
  font-size: 7px; font-weight: 700; color: var(--color-text-faint);
  letter-spacing: 0.04em; font-family: var(--font-mono);
}
/* Shell label (s/p/d/f orbital) */
.cfm-shell {
  position: absolute; top: 3px; right: 5px;
  font-size: 7px; font-weight: 700; font-family: var(--font-mono);
  letter-spacing: 0.02em;
}
.cfm-shell.s { color: var(--color-primary); }
.cfm-shell.p { color: var(--color-green); }
.cfm-shell.d { color: var(--color-orange); }
.cfm-shell.f { color: var(--color-purple); }

.cfm-sym {
  text-align: center; font-size: 16px; font-weight: 700;
  margin: 6px 0 1px; line-height: 1;
}
.cfm-name {
  text-align: center; font-size: 7px; color: var(--color-text-muted);
  margin-bottom: 4px; letter-spacing: 0.03em; text-transform: uppercase;
}
.cfm-rate {
  text-align: center; font-size: 11px; font-weight: 700;
  font-family: var(--font-mono); line-height: 1.2;
}
.cfm-sublabel {
  text-align: center; font-size: 7px; color: var(--color-text-faint);
  margin-top: 2px; font-family: var(--font-mono);
}

.cfm-pulse {
  position: absolute; bottom: 4px; right: 5px;
  width: 4px; height: 4px; border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
.cfm-pulse.live { background: var(--color-green); box-shadow: var(--glow-green); }
.cfm-pulse.warming { background: var(--color-orange); }

/* Flashing alert states for actionable signals */
.cfm-element.flash-scalp,
.cfm-element.flash-bull {
  border-color: var(--color-green);
  box-shadow: 0 0 8px rgba(38, 212, 126, 0.25);
  animation: glowGreen 1.5s ease-in-out infinite alternate;
}
.cfm-element.flash-fade,
.cfm-element.flash-bear {
  border-color: var(--color-orange);
  box-shadow: 0 0 8px rgba(255, 159, 58, 0.25);
  animation: glowOrange 1.5s ease-in-out infinite alternate;
}
.cfm-element.flash-danger {
  border-color: var(--color-red);
  box-shadow: 0 0 8px rgba(255, 75, 110, 0.25);
  animation: glowRed 1.5s ease-in-out infinite alternate;
}
.cfm-element.dead-flat {
  opacity: 0.5;
}
@keyframes glowGreen { from { box-shadow: 0 0 4px rgba(38,212,126,0.15); } to { box-shadow: 0 0 12px rgba(38,212,126,0.35); } }
@keyframes glowOrange { from { box-shadow: 0 0 4px rgba(255,159,58,0.15); } to { box-shadow: 0 0 12px rgba(255,159,58,0.35); } }
@keyframes glowRed { from { box-shadow: 0 0 4px rgba(255,75,110,0.15); } to { box-shadow: 0 0 12px rgba(255,75,110,0.35); } }

.cfm-signal-tag {
  position: absolute; bottom: 2px; left: 5px;
  font-size: 6px; font-weight: 800; letter-spacing: 0.05em;
  text-transform: uppercase; padding: 1px 3px; border-radius: 2px;
  line-height: 1;
}
.cfm-signal-tag.scalp,
.cfm-signal-tag.bull { background: var(--color-green-dim); color: var(--color-green); }
.cfm-signal-tag.fade,
.cfm-signal-tag.bear { background: var(--color-orange-dim); color: var(--color-orange); }
.cfm-signal-tag.danger { background: var(--color-red-dim); color: var(--color-red); }
.cfm-signal-tag.even { background: var(--color-surface-3); color: var(--color-text-faint); }

/* Opportunities panel */
.opp-panel {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  margin-bottom: 14px;
}
.opp-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 8px;
  margin-top: 10px;
}
.opp-card {
  padding: 10px 12px;
  border-radius: var(--radius-md);
  font-size: 11px;
  line-height: 1.4;
  display: flex; flex-direction: column; gap: 4px;
}
.opp-card.scalp,
.opp-card.bull { background: var(--color-green-dim); border-left: 3px solid var(--color-green); }
.opp-card.fade,
.opp-card.bear { background: var(--color-orange-dim); border-left: 3px solid var(--color-orange); }
.opp-card.danger { background: var(--color-red-dim); border-left: 3px solid var(--color-red); }
.opp-card.even { background: var(--color-surface-2); border-left: 3px solid var(--color-text-faint); }
.opp-head {
  display: flex; align-items: center; gap: 6px;
  font-weight: 700; font-size: 12px;
}
.opp-desc { color: var(--color-text-muted); }

/* Partition bar inside element */
.cfm-partition-bar {
  display: flex; gap: 1px; margin-top: 4px; height: 3px;
}
.cfm-partition-seg {
  flex: 1; border-radius: 1px;
  background: var(--color-border);
}
.cfm-partition-seg.active { background: var(--color-primary); opacity: 0.7; }
.cfm-partition-seg.empty { background: var(--color-border); opacity: 0.3; }

.cfm-orch-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 14px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  margin-bottom: 12px;
  font-size: 11px;
  flex-wrap: wrap;
}
.cfm-orch-item {
  display: flex; align-items: center; gap: 4px;
  color: var(--color-text-muted);
}
.cfm-orch-val { font-family: var(--font-mono); font-weight: 600; color: var(--color-text); }
.cfm-orch-dot {
  width: 4px; height: 4px; border-radius: 50%;
  display: inline-block;
}
.cfm-orch-dot.ok { background: var(--color-green); }
.cfm-orch-dot.warn { background: var(--color-orange); }
.cfm-orch-dot.off { background: var(--color-red); }

/* ---- Prediction Analytics ---- */
.pred-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
}

.pred-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 18px;
  position: relative;
  overflow: hidden;
  transition: border-color var(--transition);
  cursor: pointer;
}
.pred-card:hover { border-color: var(--color-text-muted); }
.pred-card.strong_bull { border-left: 3px solid var(--color-green); }
.pred-card.bullish { border-left: 3px solid rgba(38, 212, 126, 0.5); }
.pred-card.strong_bear { border-left: 3px solid var(--color-red); }
.pred-card.bearish { border-left: 3px solid rgba(255, 75, 110, 0.5); }
.pred-card.neutral { border-left: 3px solid var(--color-text-faint); }

.pred-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
}
.pred-coin-icon {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700;
}
.pred-coin-info { flex: 1; }
.pred-coin-sym { font-size: 16px; font-weight: 700; }
.pred-coin-name { font-size: 11px; color: var(--color-text-muted); }
.pred-coin-price { font-size: 18px; font-weight: 700; font-family: var(--font-mono); text-align: right; }
.pred-coin-src { font-size: 9px; color: var(--color-text-faint); text-align: right; }

/* Signal badge */
.pred-signal {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px;
  padding: 10px 14px;
  border-radius: var(--radius-md);
  font-weight: 700;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.pred-signal.strong_bull { background: var(--color-green-dim); color: var(--color-green); }
.pred-signal.bullish { background: rgba(38, 212, 126, 0.08); color: var(--color-green); }
.pred-signal.strong_bear { background: var(--color-red-dim); color: var(--color-red); }
.pred-signal.bearish { background: rgba(255, 75, 110, 0.08); color: var(--color-red); }
.pred-signal.neutral { background: var(--color-surface-3); color: var(--color-text-muted); }

.pred-arrow {
  font-size: 22px; line-height: 1;
}

.pred-action {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 9999px;
  background: rgba(255, 255, 255, 0.08);
  color: currentColor;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* Confidence bar */
.conf-wrap { margin-bottom: 14px; }
.conf-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.conf-bar { height: 6px; background: var(--color-border); border-radius: 3px; overflow: hidden; }
.conf-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.conf-fill.bull { background: linear-gradient(90deg, var(--color-green-dim), var(--color-green)); }
.conf-fill.bear { background: linear-gradient(90deg, var(--color-red-dim), var(--color-red)); }
.conf-fill.flat { background: var(--color-text-faint); }

/* Indicator rows */
.ind-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 14px;
}
.ind-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 8px;
  background: var(--color-surface-2);
  border-radius: var(--radius-sm);
  font-size: 11px;
}
.ind-name { color: var(--color-text-muted); }
.ind-val { font-family: var(--font-mono); font-weight: 600; }
.ind-val.bull { color: var(--color-green); }
.ind-val.bear { color: var(--color-red); }
.ind-val.flat { color: var(--color-text-muted); }

/* Projection bars */
.proj-section { margin-bottom: 10px; }
.proj-title { font-size: 10px; color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.proj-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; font-family: var(--font-mono); margin-bottom: 4px;
}
.proj-label { color: var(--color-text-muted); min-width: 30px; }
.proj-range {
  flex: 1; height: 8px; background: var(--color-border);
  border-radius: 4px; position: relative; overflow: visible;
}
.proj-target {
  position: absolute; top: -2px;
  width: 12px; height: 12px; border-radius: 50%;
  border: 2px solid; transform: translateX(-50%);
}
.proj-target.bull { border-color: var(--color-green); background: var(--color-green-dim); }
.proj-target.bear { border-color: var(--color-red); background: var(--color-red-dim); }
.proj-val { min-width: 60px; text-align: right; }

/* Gauge (semicircle) */
.gauge-wrap {
  display: flex; justify-content: center; margin: 12px 0;
}
.gauge-svg { overflow: visible; }

/* Volatility badge */
.vol-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 9999px;
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
}
.vol-badge.high { background: var(--color-orange-dim); color: var(--color-orange); }
.vol-badge.medium { background: var(--color-primary-dim); color: var(--color-primary); }
.vol-badge.low { background: var(--color-surface-3); color: var(--color-text-muted); }

.pred-footer {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 10px; color: var(--color-text-faint);
  border-top: 1px solid var(--color-border-dim);
  padding-top: 8px;
  margin-top: 8px;
}
.pred-setup-list {
  display: grid;
  gap: 8px;
}
.pred-setup-item {
  display: grid;
  gap: 3px;
  padding: 10px 12px;
  background: var(--color-surface-2);
  border-radius: var(--radius-md);
  font-size: 11px;
}
.pred-setup-item span { color: var(--color-text-muted); line-height: 1.4; }

.pred-disclaimer {
  font-size: 10px; color: var(--color-text-faint);
  padding: 10px 14px;
  background: var(--color-surface-2);
  border-radius: var(--radius-md);
  margin-bottom: 14px;
  line-height: 1.5;
}

/* ---- MLB Backlog ---- */
.mlb-hero {
  margin-bottom: 16px;
}

.mlb-note {
  margin-top: 12px;

  background: var(--color-surface-2);
  color: var(--color-text-muted);

}

.mlb-toolbar {

  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.mlb-chip-strip {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-left: auto;
}

.mlb-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 12px;
}

.mlb-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);

}

.mlb-card.open {

.mlb-card-toggle {

.mlb-card-header {

.mlb-team-name {

}

.mlb-team-sub {

}

.mlb-record-pill {

}

.mlb-record-pill strong {

}

.mlb-record-pill span {
  color: var(--color-text-muted);
  font-size: 11px;
}

.mlb-metric-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.mlb-metric {
  padding: 10px 12px;

  background: var(--color-surface-2);
  border: 1px solid var(--color-border-dim);

.mlb-metric span,

  font-weight: 700;

  color: var(--color-text-muted);
}

.mlb-metric strong {

  margin-top: 5px;
  font-size: 18px;
  line-height: 1.1;
  font-family: var(--font-mono);
}

.mlb-metric small {

  margin-top: 5px;
  font-size: 10px;
  color: var(--color-text-faint);
}

.mlb-expand-panel {
  display: none;
  padding: 0 16px 16px;
}

.mlb-expand-panel.open {
  display: block;
}

.mlb-detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
}

.mlb-detail-card {
  background: var(--color-surface-2);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 12px;
}

.mlb-detail-card h4 {

}

.mlb-detail-list {
  display: grid;
  gap: 8px;
}

.mlb-detail-list div {

  gap: 8px;

.mlb-detail-list strong {
  color: var(--color-text);

  text-align: right;
}

.mlb-season-table {
  width: 100%;
  border-collapse: collapse;

.mlb-season-table th,

  padding: 8px 6px;

}

.mlb-season-table th {

}

.mlb-season-table td {

}

<script>
// ================================================================
// WE|||CRYPTO — CFM Benchmark Orchestrator v2
//
// CF Benchmarks methodology applied to public multi-venue spot sources:
//   CDC  = Crypto.com Exchange (ticker, book, trades)
//   CB   = Coinbase (spot/buy/sell prices)
//   GKO  = CoinGecko (price, volume, 24h change)
//   DEX  = DexScreener (on-chain DEX aggregated pairs)
//   BIN  = Binance spot
//   OKX  = OKX spot
//
// Rolling 15-minute window partitioned into 3 × 5-min buckets.
// Volume-Weighted Median (VWM) per partition.
// Final CFM rate = equally-weighted average of partition VWMs.
// Polls every 15 seconds with staggered, rate-limit-aware calls.
// ================================================================

(function () {
  'use strict';

  const POLL_MS = 15000;
  const WINDOW_MIN = 15;
  const PARTITIONS = 3;
  const MAX_BUF = 120;

  // Source configs with rate budgets (calls per 60s)
  const SRC = {
    CDC:  { budget: 80, used: 0, resetAt: 0, label: 'Crypto.com',   color: '#1a2c5a' },
    CB:   { budget: 60, used: 0, resetAt: 0, label: 'Coinbase',     color: '#0052ff' },
    GKO:  { budget: 25, used: 0, resetAt: 0, label: 'CoinGecko',    color: '#8dc63f' },
    DEX:  { budget: 20, used: 0, resetAt: 0, label: 'DexScreener',  color: '#a259ff' },
    BIN:  { budget: 120, used: 0, resetAt: 0, label: 'Binance',     color: '#f3ba2f' },
    OKX:  { budget: 60, used: 0, resetAt: 0, label: 'OKX',          color: '#ffffff' },
  };

  // DexScreener search queries per coin
  const DEX_QUERIES = {
    BTC:  'WBTC USDC',   ETH:  'WETH USDC',   SOL:  'SOL USDC',
    XRP:  'XRP USDT',    HYPE: 'HYPE USDC',   DOGE: 'DOGE USDT',   BNB:  'WBNB',
  };
  const DEX_BASE_SYMS = {
    BTC: ['BTC', 'WBTC'],
    ETH: ['ETH', 'WETH'],
    SOL: ['SOL', 'WSOL'],
    XRP: ['XRP', 'WXRP'],
    HYPE: ['HYPE', 'WHYPE'],
    DOGE: ['DOGE', 'WDOGE'],
    BNB: ['BNB', 'WBNB'],
  };
  const DEX_STABLE_QUOTES = new Set(['USD', 'USDC', 'USDT', 'BUSD', 'DAI', 'FDUSD', 'USDE', 'USDL', 'USDS', 'USDBC']);

  // Coinbase symbols
  const CB_SYMS = { BTC:'BTC', ETH:'ETH', SOL:'SOL', XRP:'XRP', HYPE:'HYPE', DOGE:'DOGE', BNB:'BNB' };
  const BIN_SYMS = { BTC:'BTCUSDT', ETH:'ETHUSDT', SOL:'SOLUSDT', XRP:'XRPUSDT', HYPE:'HYPEUSDT', DOGE:'DOGEUSDT', BNB:'BNBUSDT' };
  const OKX_SYMS = { BTC:'BTC-USDT', ETH:'ETH-USDT', SOL:'SOL-USDT', XRP:'XRP-USDT', HYPE:'HYPE-USDT', DOGE:'DOGE-USDT', BNB:'BNB-USDT' };

  const CDC_BASE = 'https://api.crypto.com/exchange/v1/public';
  const CB_BASE  = 'https://api.coinbase.com/v2/prices';
  const GKO_BASE = 'https://api.coingecko.com/api/v3';
  const DEX_BASE = 'https://api.dexscreener.com/latest/dex';
  const BIN_BASE = 'https://api.binance.com/api/v3';
  const OKX_BASE = 'https://www.okx.com/api/v5/market';

  // State
  const sampleBuf = {};  // sym → [ { t, sources:{CDC,CB,GKO,DEX}, vol, bid, ask } ]
  window._cfm = {};
  let timer = null;
  let cycle = 0;
  let lastMs = 0;
  let cdcTickerCache = null; // shared ticker response (single call for all coins)
  let cdcTickerAge = 0;

  // ---- Rate limiter ----
  function can(src) {
    const s = SRC[src]; if (!s) return true;
    const now = Date.now();
    if (now > s.resetAt) { s.used = 0; s.resetAt = now + 60000; }
    return s.used < s.budget;
  }
  function hit(src) { if (SRC[src]) SRC[src].used++; }

  // ---- Fetchers ----

  // CDC: single tickers call — uses shared cache from app.js if fresh
  async function fetchCDCTickers() {
    // Check shared cache from app.js (avoids duplicate HTTP call)
    const shared = window._sharedTickerCache;
    if (shared && shared.raw && Date.now() - shared.age < 10000) {
      cdcTickerCache = shared.raw;
      cdcTickerAge = shared.age;
      return cdcTickerCache;
    }
    if (!can('CDC')) return null;
    if (cdcTickerCache && Date.now() - cdcTickerAge < 10000) return cdcTickerCache;
    try {
      hit('CDC');
      const r = await fetch(`${CDC_BASE}/get-tickers`);
      if (!r.ok) return null;
      const j = await r.json();
      if (j.code !== 0) return null;
      cdcTickerCache = j.result.data;
      cdcTickerAge = Date.now();
      // Populate shared cache for app.js
      window._sharedTickerCache = { raw: cdcTickerCache, age: cdcTickerAge };
      return cdcTickerCache;
    } catch { return null; }
  }

  function parseCDCTicker(allTickers, instrument) {
    if (!allTickers) return null;
    const t = allTickers.find(x => {
      const n = (x.i || x.instrument_name || '').replace(/_/g, '');
      return n === instrument;
    });
    if (!t) return null;
    return {
      price: parseFloat(t.a ?? t.last),
      vol: parseFloat(t.vv ?? t.volume_value ?? 0),
      bid: parseFloat(t.b ?? t.best_bid ?? 0),
      ask: parseFloat(t.k ?? t.best_ask ?? 0),
    };
  }

  // Coinbase: spot + buy + sell
  async function fetchCB(sym) {
    if (!can('CB')) return null;
    try {
      hit('CB'); hit('CB'); hit('CB');
      const handleResp = async (r) => {
        if (r.status === 429) { console.warn('CB rate limited'); return null; }
        if (!r.ok) return null;
        return r.json();
      };
      const [spot, buy, sell] = await Promise.all([
        fetch(`${CB_BASE}/${sym}-USD/spot`).then(handleResp).catch(() => null),
        fetch(`${CB_BASE}/${sym}-USD/buy`).then(handleResp).catch(() => null),
        fetch(`${CB_BASE}/${sym}-USD/sell`).then(handleResp).catch(() => null),
      ]);
      const sp = parseFloat(spot?.data?.amount || 0);
      const bp = parseFloat(buy?.data?.amount || 0);
      const slp = parseFloat(sell?.data?.amount || 0);
      if (!sp) return null;
      return { price: sp, buy: bp, sell: slp, spread: bp > 0 && slp > 0 ? (Math.abs(bp - slp) / sp) * 100 : 0 };
    } catch { return null; }
  }

  // CoinGecko
  async function fetchGKO(geckoId) {
    if (!can('GKO')) return null;
    try {
      hit('GKO');
      const r = await fetch(`${GKO_BASE}/simple/price?ids=${geckoId}&vs_currencies=usd&include_24hr_vol=true&include_24hr_change=true`);
      if (!r.ok) return null;
      const j = await r.json();
      const d = j[geckoId];
      return d ? { price: d.usd, vol: d.usd_24h_vol || 0, change: d.usd_24h_change || 0 } : null;
    } catch { return null; }
  }

  async function fetchBIN(sym) {
    const binSym = BIN_SYMS[sym];
    if (!binSym || !can('BIN')) return null;
    try {
      hit('BIN'); hit('BIN');
      const [ticker, book] = await Promise.all([
        fetch(`${BIN_BASE}/ticker/24hr?symbol=${binSym}`).then(r => r.ok ? r.json() : null).catch(() => null),
        fetch(`${BIN_BASE}/ticker/bookTicker?symbol=${binSym}`).then(r => r.ok ? r.json() : null).catch(() => null),
      ]);
      const price = parseFloat(ticker?.lastPrice || 0);
      if (!price) return null;
      return {
        price,
        vol: parseFloat(ticker?.quoteVolume || 0),
        bid: parseFloat(book?.bidPrice || 0),
        ask: parseFloat(book?.askPrice || 0),
      };
    } catch { return null; }
  }

  async function fetchOKX(sym) {
    const okxSym = OKX_SYMS[sym];
    if (!okxSym || !can('OKX')) return null;
    try {
      hit('OKX');
      const r = await fetch(`${OKX_BASE}/ticker?instId=${okxSym}`);
      if (!r.ok) return null;
      const j = await r.json();
      const row = j?.data?.[0];
      const price = parseFloat(row?.last || 0);
      if (!price) return null;
      return {
        price,
        vol: parseFloat(row?.volCcy24h || 0),
        bid: parseFloat(row?.bidPx || 0),
        ask: parseFloat(row?.askPx || 0),
      };
    } catch { return null; }
  }

  // DexScreener
  async function fetchDEX(sym) {
    if (!can('DEX')) return null;
    const q = DEX_QUERIES[sym];
    if (!q) return null;
    try {
      hit('DEX');
      const r = await fetch(`${DEX_BASE}/search?q=${encodeURIComponent(q)}`);
      if (!r.ok) return null;
      const j = await r.json();
      const targetBases = new Set((DEX_BASE_SYMS[sym] || [sym]).map(v => String(v).toUpperCase()));
      const quoteScore = quote => {
        const qSym = String(quote || '').toUpperCase().replace(/\./g, '');
        return DEX_STABLE_QUOTES.has(qSym) ? 2 : (qSym.includes('USD') ? 1 : 0);
      };
      const pairs = (j.pairs || []).filter(p => {
        const baseSym = String(p.baseToken?.symbol || '').toUpperCase();
        const quoteSym = String(p.quoteToken?.symbol || '').toUpperCase();
        const price = parseFloat(p.priceUsd || 0);
        return targetBases.has(baseSym) && price > 0 && quoteScore(quoteSym) > 0;
      }).sort((a, b) => {
        const quoteDelta = quoteScore(b.quoteToken?.symbol) - quoteScore(a.quoteToken?.symbol);
        if (quoteDelta !== 0) return quoteDelta;
        const liqDelta = parseFloat(b.liquidity?.usd || 0) - parseFloat(a.liquidity?.usd || 0);
        if (liqDelta !== 0) return liqDelta;
        return parseFloat(b.volume?.h24 || 0) - parseFloat(a.volume?.h24 || 0);
      });
      if (pairs.length === 0) return null;
      const top = pairs[0];
      return {
        price: parseFloat(top.priceUsd || 0),
        vol: parseFloat(top.volume?.h24 || 0),
        liq: parseFloat(top.liquidity?.usd || 0),
        dex: top.dexId,
        chain: top.chainId,
        pair: `${top.baseToken.symbol}/${top.quoteToken.symbol}`,
        txns: top.txns?.h24 || {},
      };
    } catch { return null; }
  }

  // ---- Sampling orchestrator (staggered) ----
  async function sampleAll() {
    const now = Date.now();

    // Phase 1: CDC (single call for all coins)
    const cdcAll = await fetchCDCTickers();

    // Phase 2: Coinbase (2 coins per cycle, rotating through all 7)
    // 2 coins * 3 calls each = 6 calls/cycle * 4 cycles/min = 24 calls/min (safe under 60)
    const cbIdx = cycle % PREDICTION_COINS.length;
    const cbBatch = [
      PREDICTION_COINS[cbIdx],
      PREDICTION_COINS[(cbIdx + 1) % PREDICTION_COINS.length],
    ];

    const cbResults = {};
    await Promise.allSettled(cbBatch.map(async c => {
      const r = await fetchCB(CB_SYMS[c.sym] || c.sym);
      if (r) cbResults[c.sym] = r;
    }));

    const binResults = {};
    await Promise.allSettled(PREDICTION_COINS.map(async c => {
      const r = await fetchBIN(c.sym);
      if (r) binResults[c.sym] = r;
    }));

    // Phase 3: CoinGecko (every 4th cycle = every 60s)
    const gkoResults = {};
    if (cycle % 4 === 0) {
      // Batch all gecko IDs in one call
      const ids = PREDICTION_COINS.map(c => c.geckoId).join(',');
      if (can('GKO')) {
        try {
          hit('GKO');
          const r = await fetch(`${GKO_BASE}/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_vol=true&include_24hr_change=true`);
          if (r.ok) {
            const j = await r.json();
            PREDICTION_COINS.forEach(c => {
              if (j[c.geckoId]) gkoResults[c.sym] = { price: j[c.geckoId].usd, vol: j[c.geckoId].usd_24h_vol || 0 };
            });
          }
        } catch {}
      }
    }

    const okxResults = {};
    if (cycle % 2 === 0) {
      await Promise.allSettled(PREDICTION_COINS.map(async c => {
        const r = await fetchOKX(c.sym);
        if (r) okxResults[c.sym] = r;
      }));
    }

    // Phase 4: DexScreener (every 5th cycle = every 75s, 2 coins at a time)
    const dexResults = {};
    if (cycle % 5 === 0 || cycle % 5 === 1) {
      const dexBatch = PREDICTION_COINS.filter((_, i) => i % 4 === (cycle % 5 === 0 ? 0 : 2)).slice(0, 2);
      for (const c of dexBatch) {
        const r = await fetchDEX(c.sym);
        if (r) dexResults[c.sym] = r;
        await new Promise(resolve => setTimeout(resolve, 300));
      }
    }

    // Assemble samples
    PREDICTION_COINS.forEach(coin => {
      const s = { t: now, sources: {}, vol: 0, bid: 0, ask: 0, meta: {} };

      // CDC
      const cdc = parseCDCTicker(cdcAll, coin.instrument);
      if (cdc) { s.sources.CDC = cdc.price; s.vol = cdc.vol; s.bid = cdc.bid; s.ask = cdc.ask; }

      // Coinbase
      if (cbResults[coin.sym]) { s.sources.CB = cbResults[coin.sym].price; s.meta.cbSpread = cbResults[coin.sym].spread; }

      // CoinGecko
      if (gkoResults[coin.sym]) { s.sources.GKO = gkoResults[coin.sym].price; if (!s.vol) s.vol = gkoResults[coin.sym].vol; }
      // Carry forward last GKO value if not polled this cycle
      else if (sampleBuf[coin.sym]?.length > 0) {
        const last = sampleBuf[coin.sym][sampleBuf[coin.sym].length - 1];
        if (last.sources.GKO) s.sources.GKO = last.sources.GKO;
      }

      // Binance
      if (binResults[coin.sym]) {
        s.sources.BIN = binResults[coin.sym].price;
        if (!s.bid && binResults[coin.sym].bid) s.bid = binResults[coin.sym].bid;
        if (!s.ask && binResults[coin.sym].ask) s.ask = binResults[coin.sym].ask;
        if (!s.vol) s.vol = binResults[coin.sym].vol;
      } else if (sampleBuf[coin.sym]?.length > 0) {
        const last = sampleBuf[coin.sym][sampleBuf[coin.sym].length - 1];
        if (last.sources.BIN) s.sources.BIN = last.sources.BIN;
      }

      // OKX
      if (okxResults[coin.sym]) {
        s.sources.OKX = okxResults[coin.sym].price;
        if (!s.bid && okxResults[coin.sym].bid) s.bid = okxResults[coin.sym].bid;
        if (!s.ask && okxResults[coin.sym].ask) s.ask = okxResults[coin.sym].ask;
        if (!s.vol) s.vol = okxResults[coin.sym].vol;
      } else if (sampleBuf[coin.sym]?.length > 0) {
        const last = sampleBuf[coin.sym][sampleBuf[coin.sym].length - 1];
        if (last.sources.OKX) s.sources.OKX = last.sources.OKX;
      }

      // DexScreener
      if (dexResults[coin.sym]) {
        s.sources.DEX = dexResults[coin.sym].price;
        s.meta.dex = dexResults[coin.sym];
      } else if (sampleBuf[coin.sym]?.length > 0) {
        const last = sampleBuf[coin.sym][sampleBuf[coin.sym].length - 1];
        if (last.sources.DEX) { s.sources.DEX = last.sources.DEX; s.meta.dex = last.meta?.dex; }
      }

      // Drop venue outliers so one bad quote cannot fabricate a fake arb window.
      const entries = Object.entries(s.sources).filter(([, value]) => Number.isFinite(value) && value > 0);
      if (entries.length >= 3) {
        const sorted = entries.map(([, value]) => value).sort((a, b) => a - b);
        const median = sorted[Math.floor(sorted.length / 2)];
        const rejected = entries.filter(([, value]) => Math.abs(value - median) / median > 0.08).map(([src]) => src);
        rejected.forEach(src => delete s.sources[src]);
        if (rejected.length) s.meta.rejectedSources = rejected;
      }

      // Buffer
      if (!sampleBuf[coin.sym]) sampleBuf[coin.sym] = [];
      sampleBuf[coin.sym].push(s);
      if (sampleBuf[coin.sym].length > MAX_BUF) sampleBuf[coin.sym] = sampleBuf[coin.sym].slice(-MAX_BUF);
    });
  }

  // ---- CFM Calculation ----
  function volumeWeightedMedian(trades) {
    if (!trades.length) return null;
    if (trades.length === 1) return trades[0].price;
    const sorted = [...trades].sort((a, b) => a.price - b.price);
    const total = sorted.reduce((s, t) => s + t.vol, 0);
    const half = total / 2;
    let cum = 0;
    for (const t of sorted) { cum += t.vol; if (cum >= half) return t.price; }
    return sorted[sorted.length - 1].price;
  }

  function computeCFM(sym) {
    const buf = sampleBuf[sym];
    if (!buf || buf.length < 3) return { cfmRate: 0, error: 'Warming up', sampleCount: buf?.length || 0 };

    const now = Date.now();
    const winMs = WINDOW_MIN * 60000;
    const winStart = now - winMs;
    const winSamples = buf.filter(s => s.t >= winStart);
    const useSamples = winSamples.length >= 2 ? winSamples : buf.slice(-10);

    // Partition → VWM
    const partMs = winMs / PARTITIONS;
    const parts = [];
    for (let i = 0; i < PARTITIONS; i++) {
      const ps = winStart + i * partMs, pe = ps + partMs;
      const pSamples = useSamples.filter(s => s.t >= ps && s.t < pe);
      if (!pSamples.length) { parts.push({ vwm: null, n: 0, i: i + 1 }); continue; }

      const trades = pSamples.map(s => {
        const prices = Object.values(s.sources);
        if (!prices.length) return null;
        return { price: prices.reduce((a, b) => a + b, 0) / prices.length, vol: s.vol || 1 };
      }).filter(Boolean);

      parts.push({ vwm: volumeWeightedMedian(trades), n: trades.length, i: i + 1 });
    }

    const valid = parts.filter(p => p.vwm !== null);
    const cfmRate = valid.length > 0 ? valid.reduce((s, p) => s + p.vwm, 0) / valid.length : 0;

    // VWAP
    let vN = 0, vD = 0;
    useSamples.forEach(s => {
      const pp = Object.values(s.sources);
      if (!pp.length) return;
      const avg = pp.reduce((a, b) => a + b, 0) / pp.length;
      const v = s.vol || 1;
      vN += avg * v; vD += v;
    });
    const vwap15 = vD > 0 ? vN / vD : cfmRate;

    // TWAP
    const allP = useSamples.map(s => {
      const pp = Object.values(s.sources);
      return pp.length > 0 ? pp.reduce((a, b) => a + b, 0) / pp.length : null;
    }).filter(Boolean);
    const twap15 = allP.length > 0 ? allP.reduce((a, b) => a + b, 0) / allP.length : cfmRate;

    // Cross-exchange spread + convergence
    const latest = buf[buf.length - 1];
    const srcPrices = Object.entries(latest.sources);
    const prices = srcPrices.map(([, v]) => v);
    const spread = prices.length > 1 ? ((Math.max(...prices) - Math.min(...prices)) / Math.min(...prices)) * 100 : 0;
    let convergence = 0;
    if (prices.length > 1) {
      const mean = prices.reduce((a, b) => a + b, 0) / prices.length;
      convergence = mean > 0 ? (Math.sqrt(prices.reduce((s, p) => s + (p - mean) ** 2, 0) / prices.length) / mean) * 100 : 0;
    }

    // Bid-ask
    const bidAsk = latest.bid > 0 && latest.ask > 0 ? ((latest.ask - latest.bid) / latest.bid) * 100 : 0;

    // Momentum (rate of cfmRate change over last 5 cycles)
    let momentum = 0;
    if (buf.length > 5) {
      const older = buf[buf.length - 6];
      const op = Object.values(older.sources);
      if (op.length) { const oa = op.reduce((a, b) => a + b, 0) / op.length; if (oa > 0) momentum = ((cfmRate - oa) / oa) * 100; }
    }

    // Trend
    let trend = 'flat';
    if (allP.length > 2) {
      const h1 = allP.slice(0, Math.floor(allP.length / 2));
      const h2 = allP.slice(Math.floor(allP.length / 2));
      const a1 = h1.reduce((a, b) => a + b, 0) / h1.length;
      const a2 = h2.reduce((a, b) => a + b, 0) / h2.length;
      const d = ((a2 - a1) / a1) * 100;
      trend = d > 0.03 ? 'rising' : d < -0.03 ? 'falling' : 'flat';
    }

    // Source breakdown
    const sourceDetail = {};
    srcPrices.forEach(([k, v]) => { sourceDetail[k] = v; });

    // DEX metadata
    const dexMeta = latest.meta?.dex || null;

    return {
      cfmRate, vwap15, twap15, spread, convergence, bidAsk, momentum, trend,
      partitions: parts,
      sources: sourceDetail,
      sourceCount: Object.keys(sourceDetail).length,
      sampleCount: buf.length,
      windowSamples: useSamples.length,
      dexMeta,
      cbSpread: latest.meta?.cbSpread || 0,
      lastPrice: prices.length > 0 ? prices[prices.length - 1] : 0,
      updatedAt: new Date().toLocaleTimeString(),
    };
  }

  // ---- Orchestrator ----
  async function runCycle() {
    const t0 = Date.now();
    cycle++;
    await sampleAll();
    PREDICTION_COINS.forEach(c => { window._cfm[c.sym] = computeCFM(c.sym); });
    lastMs = Date.now() - t0;
  }

  // ---- Public API ----
  window.CFMEngine = {
    async start() { await runCycle(); timer = setInterval(runCycle, POLL_MS); },
    stop() { if (timer) { clearInterval(timer); timer = null; } },
    get(sym) { return window._cfm[sym] || null; },
    getAll() { return window._cfm; },
    getStatus() {
      return {
        running: !!timer, cycle, lastMs, pollMs: POLL_MS,
        sources: Object.fromEntries(Object.entries(SRC).map(([k, v]) => [k, { label: v.label, color: v.color, used: v.used, budget: v.budget, pct: Math.round((v.used / v.budget) * 100) }])),
        buffers: Object.fromEntries(PREDICTION_COINS.map(c => [c.sym, sampleBuf[c.sym]?.length || 0])),
      };
    },
  };

})();
