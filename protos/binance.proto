syntax = "proto3";

package binance.marketdata;

service MarketData {
  rpc GetKlines (KlinesRequest) returns (KlinesResponse) {}
  rpc GetTickerPrice (TickerPriceRequest) returns (TickerPriceResponse) {}
}

message KlinesRequest {
  string symbol = 1;
  string interval = 2;
  int64 startTime = 3;
  int64 endTime = 4;
  int32 limit = 5;
}

message KlinesResponse {
  repeated Kline klines = 1;
}

message Kline {
  int64 openTime = 1;
  string open = 2;
  string high = 3;
  string low = 4;
  string close = 5;
  string volume = 6;
  int64 closeTime = 7;
  string quoteAssetVolume = 8;
  int32 numberOfTrades = 9;
  string takerBuyBaseAssetVolume = 10;
  string takerBuyQuoteAssetVolume = 11;
}

message TickerPriceRequest {
  string symbol = 1;
}

message TickerPriceResponse {
  string symbol = 1;
  string price = 2;
}
