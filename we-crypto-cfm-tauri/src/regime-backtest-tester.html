<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regime Backtest Tester · WeCrypto</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b1020;
      color: #e0e0e0;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #141b2f;
      border: 1px solid #2a3f5f;
      border-radius: 8px;
      padding: 24px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #fff;
    }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    select, input, button {
      padding: 10px 14px;
      border: 1px solid #2a3f5f;
      background: #1a2540;
      color: #e0e0e0;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button {
      background: #0066cc;
      color: #fff;
      font-weight: 600;
      transition: background 0.2s;
    }
    button:hover {
      background: #0052a3;
    }
    button:disabled {
      background: #2a3f5f;
      cursor: not-allowed;
    }
    .results {
      background: #0f1622;
      border: 1px solid #2a3f5f;
      border-radius: 4px;
      padding: 16px;
      margin-top: 24px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 600px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .status {
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .status.loading {
      background: #2a3f5f;
      color: #90caf9;
    }
    .status.success {
      background: #1b5e20;
      color: #81c784;
    }
    .status.error {
      background: #b71c1c;
      color: #ef5350;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .kpi {
      background: #1a2540;
      border: 1px solid #2a3f5f;
      border-radius: 4px;
      padding: 12px;
    }
    .kpi-label {
      font-size: 12px;
      color: #90caf9;
      margin-bottom: 4px;
    }
    .kpi-value {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Regime Backtest Tester</h1>
    
    <div class="controls">
      <select id="coin">
        <option>BTC</option>
        <option>ETH</option>
        <option>SOL</option>
        <option>XRP</option>
        <option>DOGE</option>
        <option>BNB</option>
        <option>HYPE</option>
      </select>
      
      <input type="number" id="days" min="1" max="365" value="30" placeholder="Days">
      
      <button id="runBtn" onclick="runBacktest()">Run Backtest</button>
      <button onclick="clearResults()">Clear</button>
    </div>
    
    <div id="statusDiv"></div>
    <div id="summaryDiv"></div>
    <div id="resultsDiv" class="results"></div>
  </div>

  <script>
    const { invoke } = window.__TAURI__.core;

    async function runBacktest() {
      const coin = document.getElementById('coin').value;
      const days = parseInt(document.getElementById('days').value) || 30;
      const btn = document.getElementById('runBtn');
      const status = document.getElementById('statusDiv');
      const summary = document.getElementById('summaryDiv');
      const results = document.getElementById('resultsDiv');
      
      btn.disabled = true;
      status.innerHTML = `<div class="status loading">⏳ Running backtest for ${coin} (${days} days)...</div>`;
      results.textContent = '';
      summary.innerHTML = '';
      
      try {
        const result = await invoke('run_backtest_regime', { coin, days });
        const data = JSON.parse(result);
        
        if (data.error) {
          status.innerHTML = `<div class="status error">❌ ${data.error}</div>`;
          results.textContent = result;
        } else {
          status.innerHTML = `<div class="status success">✓ Backtest complete: ${data.candles} candles</div>`;
          
          // Build summary
          let summaryHTML = '<div class="summary">';
          Object.entries(data.horizons).forEach(([key, h]) => {
            summaryHTML += `
              <div class="kpi">
                <div class="kpi-label">${key} Win Rate</div>
                <div class="kpi-value">${h.win_rate}%</div>
                <div style="font-size: 11px; color: #90caf9; margin-top: 4px;">${h.trades} trades · ${h.total_return.toFixed(2)}% return</div>
              </div>
            `;
          });
          summaryHTML += '</div>';
          summary.innerHTML = summaryHTML;
          
          results.textContent = JSON.stringify(data, null, 2);
        }
      } catch (err) {
        status.innerHTML = `<div class="status error">❌ Error: ${err.message}</div>`;
        results.textContent = err.message;
      } finally {
        btn.disabled = false;
      }
    }

    function clearResults() {
      document.getElementById('statusDiv').innerHTML = '';
      document.getElementById('summaryDiv').innerHTML = '';
      document.getElementById('resultsDiv').textContent = '';
    }

    // Allow Enter to run
    document.getElementById('days').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') runBacktest();
    });
  </script>
</body>
</html>
